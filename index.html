<!DOCTYPE html> 
<html> 

<!--      HEAD       -->


<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    
</head>

<!--      HEAD       -->


<body> 
        <div id="Header">
            
            <!-- Branding heading -->
            <div>
                <h1>Track my job!</h1>
            </div>
            <!-- ------------------------------------- -->

            <!--STATUS CARDS-->
            <div id="Cards">


                <!-- total wala card -->
                <div class="tracker-card" id="total-card">
                    <p>total</p>
                    <p> 0 </p>
                </div>

                <!----------------------->

                <!--Applied wala card-->
                <div class="tracker-card" id="applied-card">
                    <p>Applied</p>
                    <p> 0 </p>
                </div>


                <!--INTERVIEWS-->
                <div class="tracker-card" id="interview-card">
                    <p>Interview</p>
                    <p> 0 </p>
                </div>
                <!------------------------------------>




                <!-- Offers wala -->
                <div class="tracker-card" id="offers-card">
                    <p>Offers</p>
                    <p> 0 </p>
                </div>
                <!------------------------------------>


                <!-- Rejected wala -->
                <div class="tracker-card" id="rejected-card">
                    <p>Rejected</p>
                    <p> 0 </p>
                </div>
                <!------------------------------------>


            </div>


        </div>

        <div id="Body">


<div id="Body">

    <div id="form-over">
        <form id="job-form"> 
            <h2>Add New Application</h2>
            <input type="text" id="job-title" placeholder="Job Title">
            <input type="text" id="company-name" placeholder="Company Name">
            <input type="text" id="job-url" placeholder="Job URL">

            <div class="form-btns">
                <button type="button" id="AddJob">Add Job</button>
                <button type="button" id="Exit">Cancel</button>
            </div>
        </form>
    </div>

    <div class="choice-btn">

                <div>  <p> All </p> </div>
                <div>  <p> Applied </p> </div>
                <div>  <p> Accepted </p> </div>
                <div>  <p> Offer </p> </div>
                <div>  <p> Interview </p> </div>
                <div>  <p> Rejected </p> </div>
                <div id="application"> <p>Add an application </p> </div>
                
            </div>



            <!--Main meat-->
            <div id="container">

                <div id="extra-info">
                    <div class="info">
                        <p>#</p>
                        <p>Title</p>
                        <p>Company</p>
                        <p>Status</p>
                        <p>Date Applied</p>
                        <p>Details</p>
                    </div>
                </div>

                <div id="job-container">


                </div>
                


                
            </div>

        </div>

        <div id="Footer">

        </div>

    <script src="logic.js"></script>

</body>


</html>
